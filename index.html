<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        section {
            padding: 20px;
        }

        img {
            width: 200px;
            border-radius: 10px;
        }

        footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Website</h1>
    <p>A simple HTML example</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<section>
    <h2>About Me</h2>
    <p>Hello! My name is User. I am learning HTML.</p>

    <h3>My Hobbies:</h3>
    <ul>
        <li>Coding</li>
        <li>Gaming</li>
        <li>Travel</li>
    </ul>

    <h3>My Favorite Website:</h3>
    <p>
        Visit 
        <a href="https://www.google.com" target="_blank">Google</a>
    </p>

    <h3>My Picture:</h3>
    <img src="https://via.placeholder.com/200" alt="Example Image">

    <h3>Click the Button:</h3>
    <button onclick="showMessage()">Click Me</button>
</section>

<footer>
    <p>© 2026 My Simple Website</p>
</footer>

<script>
    function showMessage() {
        alert("Hello! You clicked the button!");
    }
</script>

</body>
</html>
